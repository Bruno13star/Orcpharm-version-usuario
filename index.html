<!DOCTYPE html>
<html lang="pt-BR" class="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrcPharm</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              display: ['Manrope', 'sans-serif'],
            },
            colors: {
              primary: '#E00B7F', // Pink/Magenta for actions
              'primary-dark': '#B80968', // Darker pink
              'corporate': '#0049AC', // Corporate Blue for titles
              'background-light': '#FDFDFE', // White background
              'background-dark': '#0049AC', // Blue for headers
              'surface-light': '#ffffff',
              'surface-dark': '#F0F4F8',
              'text-main': '#1e293b', // Slate 800
              'text-sec': '#64748b', // Slate 500
            }
          }
        }
      }
    </script>
    <style>
      body {
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      
      /* FIX: Explicitly define font-family for icons to prevent text rendering */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-smoothing: antialiased;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .material-symbols-outlined.filled {
        font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      /* Fix for buttons showing internal structure or broken layouts */
      button {
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Specific fix for the reported selector if it's showing artifacts */
      div#root > div > div > div > div:nth-of-type(2) > button:nth-of-type(1) {
        position: relative;
        z-index: 1;
      }
    </style>

}
</script>

</head>

</html>
